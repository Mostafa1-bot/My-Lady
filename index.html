<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سؤال مهم جداً ❤️</title>
    <link rel="stylesheet" href="style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>

    <div class="main-container">
        
        <div class="question-card" id="questionCard">
            <h1>تحبيني؟ ❤️</h1>
            
           
            <div class="buttons-container" id="buttonsContainer">
                <button id="yesBtn" class="btn yes">نعم ❤️</button>
                <button id="noBtn" class="btn no">لا 💔</button>
            </div>

            <!-- منطقة القلب المخفية (ستظهر فقط عند الضغط على نعم) -->
            <div class="heart-result" id="heartResult">
                    <!--😂😂حط هنا الصورة الي انت عايزها يا كتكوتها-->
                <img src="pngtree-red-heart-icon-png-image_3208490.png" alt="">
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
